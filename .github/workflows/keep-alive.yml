name: Keep alive (Ping services)

on:
  schedule:
    - cron: '*/10 * * * *' # Every 10 minutes
  workflow_dispatch: # Allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
        run: curl -s https://lecsumm-api.onrender.com/health

      - name: Ping Hugging Face AI Service
        run: curl -s https://rithwik1810-lecsumm-ai.hf.space/health
