services:
  - type: web
    name: lecsumm-api
    runtime: docker
    rootDir: backend-springboot
    plan: free
    envVars:
      - key: MONGODB_URI
        sync: false # Set this in Render Dashboard for security
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        value: 646426743846-qu5hrl9boiu660qp5kq3hsaj9cne07no.apps.googleusercontent.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://lecsumm.indevs.in,http://localhost:5173
      - key: AI_SERVICE_URL
        sync: false # Point this to your Hugging Face space URL
